version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: caresync_postgres
    restart: always
    environment:
      POSTGRES_USER: caresync_user
      POSTGRES_PASSWORD: caresync_pass
      POSTGRES_DB: caresync_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caresync_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgres://caresync_user:caresync_pass@db:5432/caresync_db
      - JWT_SECRET=production_secret_jwt_2026_key_caresync
      - PRESCRIPTION_SECRET=production_secret_prescription_signature_hash_2026
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: caresync_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
